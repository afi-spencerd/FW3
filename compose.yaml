# Dev infrastructure for fw3 — runs under rootless Podman (`docker compose` -> podman-compose).
# App server (api/web) and database deliberately stay on separate instances; this file
# only provides the *dev* dependencies the app talks to over the network.
#
#   docker compose up -d        # start SQL Server + Redis
#   docker compose ps           # check health
#   docker compose down         # stop (data persists in named volumes)
#   docker compose down -v      # stop and wipe data
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fw3-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      # Overridden by .env (MSSQL_SA_PASSWORD); default here matches .env.example.
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Dev_Strong_Pass_2024!}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # sqlcmd path differs by image; 2022 ships it under /opt/mssql-tools18.
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: docker.io/redis:7-alpine
    container_name: fw3-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mssql-data:
  redis-data:
